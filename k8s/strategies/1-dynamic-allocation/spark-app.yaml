apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-app-dynamic
  labels:
    strategy: dynamic-allocation
spec:
  type: Python
  mode: cluster
  image: jonathan/spark-app:1.5
  imagePullPolicy: IfNotPresent

  mainApplicationFile: local:///opt/spark/app.py
  arguments:
    - "steam_heavy" # Options: top_games, sentiment, user_activity
  sparkVersion: "3.5.0"

  volumes:
    - name: data
      hostPath:
        path: /Users/jonathan/Docs/spark-app/data

  sparkConf:
    spark.kubernetes.executor.podNamePrefix: "spark-dynamic"
    spark.app.name: "spark-app-dynamic"

    # --- Dynamic Allocation ---
    spark.dynamicAllocation.enabled: "true"
    spark.dynamicAllocation.shuffleTracking.enabled: "true"
    spark.dynamicAllocation.initialExecutors: "1"
    spark.dynamicAllocation.minExecutors: "1"
    spark.dynamicAllocation.maxExecutors: "3"
    spark.dynamicAllocation.schedulerBacklogTimeout: "5s"
    spark.dynamicAllocation.sustainedSchedulerBacklogTimeout: "10s"
    spark.dynamicAllocation.executorIdleTimeout: "60s"

  executor:
    cores: 1
    memory: 512m
    labels:
      app: spark-worker
      strategy: dynamic-allocation
      app-role: spark-executor
    ports:
      - name: metrics
        containerPort: 9404
    javaOptions: >
      -javaagent:/opt/jmx/jmx_prometheus_javaagent.jar=9404:/opt/jmx/config.yaml
    env:
      - name: DATA_PATH
        value: /data
    volumeMounts:
      - name: data
        mountPath: /data

  driver:
    cores: 1
    memory: "512m"
    serviceAccount: spark
    labels:
      app-role: spark-driver
      strategy: dynamic-allocation
    ports:
      - name: metrics
        containerPort: 9404
    javaOptions: >
      -javaagent:/opt/jmx/jmx_prometheus_javaagent.jar=9404:/opt/jmx/config.yaml
    env:
      - name: DATA_PATH
        value: /data
    volumeMounts:
      - name: data
        mountPath: /data
