apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spark-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spark-worker-hpa
  minReplicas: 1
  maxReplicas: 3

  metrics:
    # Custom Metric 1: JVM heap usage > 65% (via Prometheus Adapter)
    - type: Pods
      pods:
        metric:
          name: spark_jvm_heap_usage_percent
        target:
          type: AverageValue
          averageValue: "65"

    # Custom Metric 2: CPU millicores > 700m (via Prometheus Adapter) Removed due to limitation of Orbstack
    - type: Pods
      pods:
        metric:
          name: spark_worker_cpu_millicores
        target:
          type: AverageValue
          averageValue: "700m"

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 90
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
