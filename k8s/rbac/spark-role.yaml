apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-role
  namespace: default
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - persistentvolumeclaims
      - services
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - delete
      - deletecollection
