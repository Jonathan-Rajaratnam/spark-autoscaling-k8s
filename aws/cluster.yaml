apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: spark-benchmark-cluster
  region: us-east-1
  version: "1.33"

iam:
  withOIDC: true

managedNodeGroups:
  - name: spark-nodes
    instanceType: m7i-flex.large
    desiredCapacity: 1
    minSize: 0
    maxSize: 4
    volumeSize: 100

addons:
  - name: aws-efs-csi-driver
    wellKnownPolicies:
      efsCSIController: true
